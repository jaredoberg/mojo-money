name: MojoMoney
options:
  bundleIdPrefix: com.mojomoney
  createIntermediateGroups: true
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.36.0"

configs:
  Debug: debug
  Release: release

targets:
  MojoMoney:
    type: application
    platform: [iOS, macOS]
    deploymentTarget:
      iOS: "17.0"
      macOS: "14.0"
    sources:
      - path: MojoMoney
    resources:
      - path: python
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mojomoney.app
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSHumanReadableDescription: "MOJO Money — Monarch, on autopilot."
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_NAME: "MOJO Money"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_IDENTITY: "-"
    entitlements:
      path: MojoMoney/MojoMoney.entitlements
      properties:
        com.apple.security.app-sandbox: false
